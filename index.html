<!DOCTYPE html>
<html>
<head>
  <title>Chapter Forever</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #ff758c, #ff7eb3, #7afcff, #b388ff);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      margin-top: 100px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    #mainApp {
      display: none;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<div id="loginBox" class="box">
  <h2>Who are you?</h2>
  <button onclick="selectUser('Mridul')">Mridul</button>
  <button onclick="selectUser('Aishu')">Aishu</button>

  <div id="passwordArea" style="display:none;">
    <p id="selectedUser"></p>
    <input type="password" id="password" placeholder="Enter Password">
    <br>
    <button onclick="checkPassword()">Login</button>
  </div>
</div>

<div id="mainApp">
  <h1>Chapter Forever</h1>
  <h3>Crafted By MIROVA</h3>
  <p id="welcomeUser"></p>

  <button onclick="logout()">Logout</button>
</div>

<script>
  let currentUser = "";

  const passwords = {
    "Mridul": "photos#2009",
    "Aishu": "itsmeaishu"
  };

  function selectUser(user) {
    currentUser = user;
    document.getElementById("passwordArea").style.display = "block";
    document.getElementById("selectedUser").innerText = "Enter password for " + user;
  }

  function checkPassword() {
    const entered = document.getElementById("password").value;

    if (entered === passwords[currentUser]) {
      localStorage.setItem("chapterUser", currentUser);
      openApp();
    } else {
      alert("Wrong password ❤️");
    }
  }

  function openApp() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("welcomeUser").innerText = "Welcome, " + currentUser;
  }

  function logout() {
    localStorage.removeItem("chapterUser");
    location.reload();
  }

  // Auto login if already logged in
  window.onload = function() {
    const saved = localStorage.getItem("chapterUser");
    if (saved) {
      currentUser = saved;
      openApp();
    }
  }
</script>

</body>
</html>
